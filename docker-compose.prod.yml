services:
  frontend:
    ports:
      - "4200:4200"

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: proyecto_taller_seed
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "pnpm run db:seed"

  backend:
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
      seed:
        condition: service_completed_successfully

  db:
    expose:
      - "5432"
