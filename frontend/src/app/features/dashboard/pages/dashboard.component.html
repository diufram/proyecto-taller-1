<div class="p-4">
    <h1 class="text-2xl font-bold mb-4">Dashboard</h1>
    <div *ngIf="currentUser()" class="card">
        @if (currentUser()) {
            <p>Bienvenido, {{ currentUser()?.nombre_usuario }}</p>
            <p>Rol: {{ currentUser()?.rol }}</p>
        }
    </div>
    <div class="mt-4">
        <p>Aquí se mostrarán las competencias y estadísticas.</p>
    </div>
</div>
