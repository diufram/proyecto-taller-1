<my-floating-configurator />

<div
    class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen min-w-screen overflow-hidden"
>
    <div class="flex flex-col items-center justify-center">
        <div
            style="
                border-radius: 56px;
                padding: 0.3rem;
                background: linear-gradient(
                    180deg,
                    var(--primary-color) 10%,
                    rgba(33, 150, 243, 0) 30%
                );
            "
        >
            <div
                class="w-full bg-surface-0 dark:bg-surface-900 py-20 px-8 sm:px-20"
                style="border-radius: 53px"
            >
                <div class="text-center mb-8">
                    <div
                        class="logo-mask"
                        style="width: 200px; height: 150px"
                    ></div>

                    <div
                        class="text-surface-900 dark:text-surface-0 text-3xl font-medium mb-4"
                    >
                        Crea tu cuenta
                    </div>
                    <span class="text-muted-color font-medium"
                        >Registrate para continuar</span
                    >
                </div>

                <div>
                    <label
                        for="nombre"
                        class="block text-surface-900 dark:text-surface-0 text-xl font-medium mb-2"
                        >Nombre de usuario</label
                    >
                    <input
                        pInputText
                        id="nombre"
                        type="text"
                        placeholder="Tu nombre de usuario"
                        class="w-full md:w-120 mb-4"
                        [(ngModel)]="nombre_usuario"
                    />

                    <label
                        for="email"
                        class="block text-surface-900 dark:text-surface-0 text-xl font-medium mb-2"
                        >Correo electronico</label
                    >
                    <input
                        pInputText
                        id="email"
                        type="email"
                        placeholder="tu@correo.com"
                        class="w-full md:w-120 mb-4"
                        [(ngModel)]="correo_electronico"
                    />

                    <label
                        for="password"
                        class="block text-surface-900 dark:text-surface-0 font-medium text-xl mb-2"
                        >Contrasena</label
                    >
                    <p-password
                        id="password"
                        [(ngModel)]="contrasena"
                        placeholder="Minimo 8 caracteres"
                        [toggleMask]="true"
                        styleClass="mb-4 w-full"
                        [fluid]="true"
                        [feedback]="false"
                    ></p-password>

                    <label
                        for="confirmPassword"
                        class="block text-surface-900 dark:text-surface-0 font-medium text-xl mb-2"
                        >Confirmar contrasena</label
                    >
                    <p-password
                        id="confirmPassword"
                        [(ngModel)]="confirmarContrasena"
                        placeholder="Repite tu contrasena"
                        [toggleMask]="true"
                        styleClass="mb-6 w-full"
                        [fluid]="true"
                        [feedback]="false"
                    ></p-password>

                    <p-button
                        label="Crear Cuenta"
                        styleClass="w-full"
                        [loading]="loading"
                        (onClick)="onRegister()"
                    >
                    </p-button>

                    <div class="mt-4 text-center">
                        <span class="text-muted-color text-sm">
                            Ya tienes cuenta?
                        </span>
                        <a
                            routerLink="/auth/login"
                            class="text-primary font-medium no-underline ml-1 cursor-pointer"
                        >
                            Inicia sesion
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
