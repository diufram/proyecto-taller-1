<my-floating-configurator />

<div
    class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen min-w-screen overflow-hidden"
>
    <div class="flex flex-col items-center justify-center">
        <div
            style="
                border-radius: 56px;
                padding: 0.3rem;
                background: linear-gradient(
                    180deg,
                    var(--primary-color) 10%,
                    rgba(33, 150, 243, 0) 30%
                );
            "
        >
            <div
                class="w-full bg-surface-0 dark:bg-surface-900 py-20 px-8 sm:px-20"
                style="border-radius: 53px"
            >
                <div class="text-center mb-8">
                    <div
                        class="logo-mask"
                        style="width: 200px; height: 150px"
                    ></div>

                    <div
                        class="text-surface-900 dark:text-surface-0 text-3xl font-medium mb-4"
                    >
                        ¡Bienvenido!
                    </div>
                    <span class="text-muted-color font-medium"
                        >Inicia sesión para continuar</span
                    >
                </div>

                <div>
                    <label
                        for="email1"
                        class="block text-surface-900 dark:text-surface-0 text-xl font-medium mb-2"
                        >Correo electrónico</label
                    >
                    <input
                        pInputText
                        id="email1"
                        type="text"
                        placeholder="Tu correo electrónico"
                        class="w-full md:w-120 mb-8"
                        [(ngModel)]="correo_electronico"
                    />

                    <label
                        for="password1"
                        class="block text-surface-900 dark:text-surface-0 font-medium text-xl mb-2"
                        >Contraseña</label
                    >
                    <p-password
                        id="password1"
                        [(ngModel)]="contrasena"
                        placeholder="Contraseña"
                        [toggleMask]="true"
                        styleClass="mb-4"
                        [fluid]="true"
                        [feedback]="false"
                    >
                    </p-password>

                    <!-- <div class="flex items-center justify-between mt-2 mb-8 gap-8">
                        <div class="flex items-center">
                            <p-checkbox [(ngModel)]="checked" id="rememberme1" binary class="mr-2"></p-checkbox>
                            <label for="rememberme1">Remember me</label>
                        </div>
                        <span class="font-medium no-underline ml-2 text-right cursor-pointer text-primary">Forgot
                            password?</span>
                    </div> -->

                    <p-button
                        label="Iniciar Sesión"
                        styleClass="w-full"
                        [loading]="loading"
                        (onClick)="onLogin()"
                    >
                    </p-button>

                    <div class="mt-6 text-center">
                        <span class="text-muted-color font-medium"
                            >¿No tienes cuenta?</span
                        >
                        <a
                            routerLink="/auth/register"
                            class="text-primary font-medium hover:underline ml-2"
                            >Regístrate</a
                        >
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
