<div class="login-page">
    <a routerLink="/" class="auth-brand" aria-label="Ir al inicio">
        <span class="auth-brand-mark">
            <img src="/icono_p.png" alt="" />
        </span>
        <span>Compex</span>
    </a>

    <div class="auth-card-shell">
    <div class="login-card">
        <div class="login-card-header">
            <div class="login-logo" aria-hidden="true">
                <img src="/icono_p.png" alt="" />
            </div>
            <h1>¡Bienvenido!</h1>
            <p>Inicia sesión para continuar</p>
        </div>

        <form
            [formGroup]="form"
            (ngSubmit)="onLogin()"
            class="login-form"
        >
            <div class="form-field">
                <p-floatlabel variant="on">
                    <input
                        pInputText
                        id="correo_electronico"
                        type="email"
                        formControlName="correo_electronico"
                        class="w-full"
                        [invalid]="isInvalid('correo_electronico')"
                        autocomplete="email"
                    />
                    <label for="correo_electronico">Correo electrónico</label>
                </p-floatlabel>
                @if (isInvalid("correo_electronico")) {
                    <p-message
                        severity="error"
                        size="small"
                        variant="simple"
                        >Correo electrónico inválido.</p-message
                    >
                }
            </div>

            <div class="form-field">
                <p-floatlabel variant="on">
                    <input
                        pInputText
                        inputId="contrasena"
                        type="password"
                        formControlName="contrasena"
                        class="w-full"
                        [invalid]="isInvalid('contrasena')"
                        autocomplete="current-password"
                    />
                    <label for="contrasena">Contraseña</label>
                </p-floatlabel>
                @if (isInvalid("contrasena")) {
                    <p-message
                        severity="error"
                        size="small"
                        variant="simple"
                        >La contraseña es requerida.</p-message
                    >
                }
            </div>

            <p-button
                type="submit"
                label="Iniciar sesión"
                icon="pi pi-sign-in"
                severity="success"
                styleClass="w-full"
                [loading]="loading"
                [disabled]="form.invalid"
            ></p-button>

            <div class="login-footer">
                <span>¿No tienes cuenta?</span>
                <a routerLink="/auth/register">Regístrate</a>
            </div>
        </form>
    </div>
    </div>
</div>
